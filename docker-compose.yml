services:
  mongo:
    image: mongo:7
    container_name: athens-fm-mongo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: athens-fm-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: api
    container_name: athens-fm-api
    env_file:
      - .env
    environment:
      PORT: "3001"
      MONGODB_URI: mongodb://mongo:27017/athens-fm
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:${WEB_HOST_PORT:-5173}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${API_HOST_PORT:-3001}:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/package.json:/app/apps/api/package.json
      - ./apps/api/tsconfig.json:/app/apps/api/tsconfig.json
      - ./apps/api/tsconfig.build.json:/app/apps/api/tsconfig.build.json
      - ./apps/api/jest.config.ts:/app/apps/api/jest.config.ts
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: web
    container_name: athens-fm-web
    environment:
      VITE_API_PROXY_TARGET: http://api:3001
      VITE_HMR_CLIENT_PORT: ${WEB_HOST_PORT:-5173}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${WEB_HOST_PORT:-5173}:5173"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/index.html:/app/apps/web/index.html
      - ./apps/web/public:/app/apps/web/public
      - ./apps/web/vite.config.ts:/app/apps/web/vite.config.ts
      - ./apps/web/components.json:/app/apps/web/components.json
      - ./apps/web/tsconfig.json:/app/apps/web/tsconfig.json
      - ./apps/web/tsconfig.app.json:/app/apps/web/tsconfig.app.json
      - ./apps/web/tsconfig.node.json:/app/apps/web/tsconfig.node.json
      - ./apps/web/package.json:/app/apps/web/package.json
    depends_on:
      - api

volumes:
  mongo_data:
  redis_data:
